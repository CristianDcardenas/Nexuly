name: nexuly_app
description: "Nexuly - Plataforma de servicios de salud domiciliarios."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # --- Firebase (BoM unificada, versiones compatibles entre sí) ---
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0
  firebase_storage: ^12.3.6
  firebase_messaging: ^15.1.5
  firebase_app_check: ^0.3.2
  cloud_functions: ^5.1.5

  # --- State management ---
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # --- Modelos inmutables (Freezed 3.x, compatible con analyzer 7.x) ---
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # --- Navegación ---
  go_router: ^14.6.1

  # --- Utilidades ---
  intl: ^0.19.0
  equatable: ^2.0.5
  collection: ^1.18.0
  geoflutterfire_plus: ^0.0.9+2
  flutter_dotenv: ^5.2.1
  logger: ^2.5.0

  # --- UI auxiliares ---
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # --- Code generation (versiones alineadas con analyzer 7.x) ---
  build_runner: ^2.4.13
  freezed: ^3.0.3
  json_serializable: ^6.9.0
  riverpod_generator: ^2.6.3
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true
