name: nexuly_app
description: "Nexuly - Plataforma de servicios de salud domiciliarios."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # --- Firebase ---
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0
  firebase_storage: ^12.3.6
  firebase_messaging: ^15.1.5
  firebase_app_check: ^0.3.2
  cloud_functions: ^5.1.5

  # --- State management ---
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # --- Modelos inmutables ---
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # --- Navegación ---
  go_router: ^14.6.1

  # --- Google Sign-In ---
  google_sign_in: ^6.2.2

  # --- Utilidades ---
  intl: ^0.19.0
  equatable: ^2.0.5
  collection: ^1.18.0
  geoflutterfire_plus: ^0.0.9+2
  flutter_dotenv: ^5.2.1
  logger: ^2.5.0

  # --- UI auxiliares ---
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

  # === RETO 1: Mundo real ===
  # QR: generación y lectura
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3
  # Sensores y ubicación
  geolocator: ^13.0.2
  # Almacenamiento local persistente
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5

  # === RETO 2: Notificaciones + Onboarding ===
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
  shared_preferences: ^2.3.3
  lottie: ^3.1.3
  smooth_page_indicator: ^1.2.0

  # === RETO 3: Analíticas + Exportación ===
  fl_chart: ^0.69.0
  pdf: ^3.11.1
  printing: ^5.13.2
  screenshot: ^3.0.0

  # === RETO 4: Seguridad ===
  flutter_secure_storage: ^9.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  # === RETO 4: Testing ===
  mocktail: ^1.0.4
  fake_cloud_firestore: ^3.0.3
  firebase_auth_mocks: ^0.14.1

  # --- Code generation ---
  build_runner: ^2.4.13
  freezed: ^3.0.3
  json_serializable: ^6.9.0
  riverpod_generator: ^2.6.3
  # NOTA: hive_generator se omite a propósito — no lo necesitamos porque
  # guardamos JSON genérico (Map/List) en las boxes de Hive, sin TypeAdapters
  # custom. Si en el futuro quisiéramos objetos fuertemente tipados en Hive,
  # habría que resolver el conflicto: hive_generator depende de analyzer <7
  # y el resto del proyecto (freezed 3, riverpod_generator) requiere analyzer 7+.
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true
  assets:
  #  - assets/lottie/